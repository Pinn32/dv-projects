      #   href: en/hobbies/index.qmd
      # - text: All Posts
      #   href: en/all-posts/index.qmd
      # - text: About
      #   href: about/index.qmd
    
    # right: 
    #   - text: EN
    #     href: index.qmd
    #   - text: 中文
    #     href: index.zh.qmd

    ###### NavBar Tools #################################################
    tools: 
      ###### Language Switch / Translation ######
      - icon: translate
        menu: 
          - text: English
            href: "#"
            # id: switch-en # 没有 id 属性
            # href: "#"
            # class: lang-switch
          - text: 中文
            href: "#"
