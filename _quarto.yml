format:
  html:
    # self-contained: false
    theme:
      - minty
    syntax-highlighting: pygments
    css: src/styles/styles.css
    include-after-body: 
      - src/scripts/fix-code-fold.html
      # - src/scripts/fix-navbar-active.html
    toc: true
    code-tools: true
      # toggle: true
      # source: true
      # caption: "hi"
    code-fold: true
    # code-summary: "Show the code"

editor: visual

