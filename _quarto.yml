project:
  type: website

website:
  title: "Pinn (Aiqi) Xu Projects"
  #title-separator: " | "
  description: "A collection of projects by Pinn (Aiqi) Xu, showcasing work in data science, machine learning, and software development."
  favicon: src/img/favicon.ico
  navbar:
    left:
      # - href: index.qmd
      #   text: Home
      - text: Projects
        href: projects/index.qmd
      - text: Tutorials
        href: tutorials/index.qmd
      - text: About
        href: about/index.qmd
  sidebar:
    style: 'docked'
    background: light
    # search: true
    collapse: true
    # contents: auto
    contents: 
      - section: "All Projects"
        href: projects/index.qmd
        contents:
          - text: "Twitter Sentiment Analysis of Catalan Referendum"
