      - icon: linkedin
        href: https://www.linkedin.com/in/aiqi-xu-71943b378/

      # - icon: https://cdn.brandfetch.io/idriarYq6Q/w/400/h/400/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1686028240869
      #   href: https://twitter.com/<insert_twitter_id_here>


  #############################################################################
  sidebar: 
    - id: en-sidebar
      logo: false
      search: true
      style: 'docked'
      collapse-level: 1
      contents:
        - section: "Projects"
          contents: "en/projects/*/index.*md"
        - section: "Tutorials"
          contents: "en/tutorials/*/index.*md"
        - section: "Blogs"
          contents: "en/blogs/*/index.*md"
        - section: "Tools"
          contents: "en/tools/*/index.*md"
        - text: "About"
          href: en/about/index.qmd
    - id: zh-sidebar
      logo: false
      search: true
      style: 'docked'
      collapse-level: 1
      contents:
        - section: "可视化项目"
          contents: "zh/projects/*/index.*md"
        - section: "数据分析教程"
          contents: "zh/tutorials/*/index.*md"
        - section: "经验博客"
          contents: "zh/blogs/*/index.*md"
        - section: "Web工具"
          contents: "zh/tools/*/index.*md"
        - text: "关于"
          href: zh/about/index.qmd


###############################################################################
format:
  html:
    # self-contained: false
    lightbox: true
    smooth-scroll: true
    # theme: 
    #     light: minty
    #     dark: darkly
    theme: minty
    from: markdown+mark
    syntax-highlighting: pygments
    css:
      - ./src/styles/styles.css
      - ./src/styles/listing.css
      - ./src/styles/portfolio.css
    
    ###### JS Scripts ######
    include-after-body:
      - ./src/scripts/fix-code-fold.html
      - ./src/scripts/lang-switch.html
      - ./src/scripts/fix-sidebar-toggle.html
      - ./src/scripts/fix-navbar-active.html
      - ./src/scripts/fix-sidebar-search.html
      # - ./src/scripts/responsive-tag-bar.html
      - ./src/scripts/strip-index-html.html
      - ./src/scripts/tag-redirect.html

    toc: true
    # toc-expand: true
    # toc-depth: 3
    code-tools: true
      # toggle: true
      # source: true
      # caption: "hi"
    code-fold: true
    # code-summary: "Show the code"


##############################################################################

# lang: en
brand: _brand.yml
editor: source
filters: 
  - src/filters/reading-stats.lua  # for reading time

