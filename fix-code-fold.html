<script id="fix-code-fold" type="text/javascript">
    const showBtn = document.getElementById('quarto-show-all-code');
    const hideBtn = document.getElementById('quarto-hide-all-code');

    if (showBtn) {
        showBtn.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('details.code-fold').forEach(el => {
                el.setAttribute('open', '');
            });
        });
    }

    if (hideBtn) {
        hideBtn.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('details.code-fold').forEach(el => {
                el.removeAttribute('open');
            });
        });
    }
</script>
