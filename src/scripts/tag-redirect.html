<script>
document.addEventListener("DOMContentLoaded", function () {

  // 每种内容类型对应的 listing 页面（可按需增减）
  const SECTION_MAP = {
    projects:  "projects",
    tutorials: "tutorials",
    blogs:     "blogs",
    tools:     "tools",
  };

  function getTarget() {
    const path = window.location.pathname;

    // 提取语言前缀 /en/ 或 /zh/，没有则为 /
    const langMatch = path.match(/^\/(en|zh)\//);
    const langPrefix = langMatch ? "/" + langMatch[1] + "/" : "/";

    // 提取当前所在 section
    const sectionMatch = path.match(/\/(projects|tutorials|blogs|tools)\//);
    const section = sectionMatch ? sectionMatch[1] : null;

    if (!section) return null; // 不在任何已知 section 下，不重写

    return langPrefix + SECTION_MAP[section] + "/";
  }

  function rewriteTagLinks() {
    const target = getTarget();
    if (!target) return;

    document.querySelectorAll("a[href*='#category=']").forEach(function (link) {
      const category = link.href.split("#category=")[1];
      if (category) {
        link.href = target + "#category=" + category;
      }
    });
  }

  rewriteTagLinks();
  new MutationObserver(rewriteTagLinks)
    .observe(document.body, { childList: true, subtree: true });
});
</script>
