<script>
    const switchLanguage = targetLang => {
        const path = window.location.pathname;
        // Capture base (e.g. '' locally, '/dv-projects' on GitHub Pages)
        const match = path.match(/^(.*?)\/(en|zh)(\/.*)?$/);
        if (match) {
            const base = match[1];
            const rest = match[3] || '/';
            window.location.pathname = `${base}/${targetLang}${rest}`;
        } else {
            window.location.pathname = `/${targetLang}/`;
        }
    };

    const NAV_TRANSLATIONS = {
        en: { 
            Projects: 'Projects', 
            Tutorials: 'Tutorials', 
            Hobbies: 'Hobbies', 
            Blogs: 'Blogs',
            About: 'About' 
        },
        zh: { 
            Projects: '项目',    
            Tutorials: '教程',       
            Hobbies: '爱好',    
            Blogs: '博客',
            About: '关于' 
        },
    };

    document.addEventListener('DOMContentLoaded', () => {
        // 遍历所有 navbar 下拉菜单链接，按文字匹配
        document.querySelectorAll('.navbar .dropdown-item').forEach(el => {
            const text = el.textContent.trim();
            if (text === 'English') {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    switchLanguage('en');
                });
            } else if (text === '中文') {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    switchLanguage('zh');
                });
            }
        });

        // Translate navbar left-side links to match the current page language
        const langMatch = window.location.pathname.match(/\/(en|zh)\//);
        const lang = langMatch ? langMatch[1] : 'en';
        const translations = NAV_TRANSLATIONS[lang] ?? NAV_TRANSLATIONS.en;

        document.querySelectorAll('.navbar-nav .nav-link').forEach(el => {
            const text = el.textContent.trim();
            if (translations[text]) {
                el.textContent = translations[text];
            }
            // Reroute hrefs from /en/ to /zh/ (or vice-versa) to match current lang
            if (lang === 'zh' && el.href?.includes('/en/')) {
                el.href = el.href.replace('/en/', '/zh/');
            } else if (lang === 'en' && el.href?.includes('/zh/')) {
                el.href = el.href.replace('/zh/', '/en/');
            }
        });
    });
</script>
