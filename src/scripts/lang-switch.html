<script>
    function switchLanguage(targetLang) {
        const path = window.location.pathname;
        // Capture base (e.g. '' locally, '/dv-projects' on GitHub Pages)
        const match = path.match(/^(.*?)\/(en|zh)(\/.*)?$/);
        if (match) {
            const base = match[1];
            const rest = match[3] || '/';
            window.location.pathname = base + '/' + targetLang + rest;
        } else {
            window.location.pathname = '/' + targetLang + '/';
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
    // 遍历所有 navbar 下拉菜单链接，按文字匹配
        document.querySelectorAll('.navbar .dropdown-item').forEach(function (el) {
            const text = el.textContent.trim();
            if (text === 'English') {
                el.addEventListener('click', function (e) {
                e.preventDefault();
                switchLanguage('en');
                });
            } else if (text === '中文') {
                el.addEventListener('click', function (e) {
                e.preventDefault();
                switchLanguage('zh');
                });
            }
        });
    });
</script>
