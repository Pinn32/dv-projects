<script id="fix-navbar-active">
    // Fix Quarto's incorrect navbar active state when a global sidebar is present.
    // Runs inline (no DOMContentLoaded) because the script is injected at end of <body>
    // so the navbar DOM is already parsed — executing before paint prevents the flash.
    // Compares path sections (/en|zh/section/...) so it works without waiting for
    // lang-switch.html to rewrite hrefs on zh pages.
    (() => {
        const path = window.location.pathname.replace(/\/index\.html$/, '/');
        const pageSectionMatch = path.match(/\/(?:en|zh)\/([^/]+)/);
        const pageSection = pageSectionMatch ? pageSectionMatch[1] : null;

        document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;

            let linkSection = null;
            try {
                const linkPath = new URL(href, window.location.href).pathname.replace(/\/index\.html$/, '/');
                const linkSectionMatch = linkPath.match(/\/(?:en|zh)\/([^/]+)/);
                linkSection = linkSectionMatch ? linkSectionMatch[1] : null;
            } catch {
                // href is malformed — skip this link
            }

            const isActive = pageSection !== null && pageSection === linkSection;
            link.classList.toggle('active', isActive);
            if (isActive) link.setAttribute('aria-current', 'page');
            else link.removeAttribute('aria-current');
        });
    })();
</script>
