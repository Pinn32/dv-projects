<!--
    Global Site Fixes — injected at end of <body> on every page via _quarto.yml.
    Each concern lives in its own <script> block so its execution timing is
    preserved (inline IIFE = before paint; DOMContentLoaded = after parse).

    Table of contents
    ─────────────────
    1. script-strip-index-html   Strip internal links' .../index.html suffixes
    2. script-fix-navbar-active  Fix navbar active state when a global sidebar is present
    3. script-nav-lang-switch    Switch navbar header language
    3. script-fix-code-fold      Wire the "show all / hide all code" buttons
    4. script-fix-sidebar-toggle Make sidebar section row's empty area toggle collapse
    5. script-fix-sidebar-search Replace the dead sidebar search box with a working button
    6. script-fix-tag-redirect   Redirect post-page tag links to their listing page
    7. script-copyright-year     Update the copyright year in the footer

    Page-specific scripts (responsive-tag-bar, post-type-filter)
    live in their own files and are included separately.
-->


<!-- ====================================================================== -->
<script id="script-strip-index-html">
    // Strip internal links' .../index.html suffixes

    // Runs inline at end of <body>: links are already parsed, and rewriting before paint
    // avoids changing hrefs the user might hover mid-load.
    (() => {
        document.querySelectorAll('a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;

            // Skip anchors, mailto/tel, protocol-relative, and absolute external URLs.
            if (/^(#|mailto:|tel:|\/\/)/.test(href)) return;

            try {
                const url = new URL(href, window.location.href);
                // Only touch same-origin links.
                if (url.origin !== window.location.origin) return;
                if (!/\/index\.html$/.test(url.pathname)) return;

                url.pathname = url.pathname.replace(/\/index\.html$/, '/');
                // Write a root-absolute path. This is safe even under the GitHub Pages
                // `/dv-projects/` base, since `url.pathname` already includes that prefix
                // (the original relative href was resolved against the current page).
                link.setAttribute('href', url.pathname + url.search + url.hash);
            } catch {
                // Malformed href — leave it untouched.
            }
        });
    })();
</script>


<!-- ====================================================================== -->
<script id="script-fix-navbar-active">
    // Fix Quarto's incorrect navbar active state when a global sidebar is present.

    // Runs inline (no DOMContentLoaded) because the script is injected at end of <body>
    // so the navbar DOM is already parsed — executing before paint prevents the flash.
    // Compares path sections (/en|zh/section/...) so it works without waiting for
    // script-nav-lang-switch to rewrite hrefs on zh pages.
    (() => {
        const path = window.location.pathname.replace(/\/index\.html$/, '/');
        const pageSectionMatch = path.match(/\/(?:en|zh)\/([^/]+)/);
        const pageSection = pageSectionMatch ? pageSectionMatch[1] : null;

        document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;

            let linkSection = null;
            try {
                const linkPath = new URL(href, window.location.href).pathname.replace(/\/index\.html$/, '/');
                const linkSectionMatch = linkPath.match(/\/(?:en|zh)\/([^/]+)/);
                linkSection = linkSectionMatch ? linkSectionMatch[1] : null;
            } catch {
                // href is malformed — skip this link
            }

            const isActive = pageSection !== null && pageSection === linkSection;
            link.classList.toggle('active', isActive);
            if (isActive) link.setAttribute('aria-current', 'page');
            else link.removeAttribute('aria-current');
        });
    })();
</script>

<script id="script-nav-lang-switch">
    // Switch navbar header language

    const switchLanguage = targetLang => {
        const path = window.location.pathname;
        // Capture base (e.g. '' locally, '/dv-projects' on GitHub Pages)
        const match = path.match(/^(.*?)\/(en|zh)(\/.*)?$/);
        if (match) {
            const base = match[1];
            const rest = match[3] || '/';
            window.location.pathname = `${base}/${targetLang}${rest}`;
        } else {
            window.location.pathname = `/${targetLang}/`;
        }
    };

    const NAV_TRANSLATIONS = {
        en: {
            Projects: 'Projects',
            Tutorials: 'Tutorials',
            Tools: 'Tools',
            Blogs: 'Blogs',
            Hobbies: 'Hobbies',
            'All Posts': 'All Posts',
            About: 'About'
        },
        zh: {
            Projects: '项目',
            Tutorials: '教程',
            Tools: '工具',
            Blogs: '博客',
            Hobbies: '爱好',
            'All Posts': '所有文章',
            About: '关于'
        },
    };

    document.addEventListener('DOMContentLoaded', () => {
        // 遍历所有 navbar 下拉菜单链接，按文字匹配
        document.querySelectorAll('.navbar .dropdown-item').forEach(el => {
            const text = el.textContent.trim();
            if (text === 'English') {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    switchLanguage('en');
                });
            } else if (text === '中文') {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    switchLanguage('zh');
                });
            }
        });

        // Translate navbar left-side links to match the current page language
        const langMatch = window.location.pathname.match(/\/(en|zh)\//);
        const lang = langMatch ? langMatch[1] : 'en';
        const translations = NAV_TRANSLATIONS[lang] ?? NAV_TRANSLATIONS.en;

        document.querySelectorAll('.navbar-nav .nav-link').forEach(el => {
            const text = el.textContent.trim();
            if (translations[text]) {
                el.textContent = translations[text];
            }
            // Reroute hrefs from /en/ to /zh/ (or vice-versa) to match current lang
            if (lang === 'zh' && el.href?.includes('/en/')) {
                el.href = el.href.replace('/en/', '/zh/');
            } else if (lang === 'en' && el.href?.includes('/zh/')) {
                el.href = el.href.replace('/zh/', '/en/');
            }
        });
    });
</script>

<script id="script-fix-code-fold">
    // Wire the "show all / hide all code" buttons to every code-fold <details>.
    
    const bindToggle = (id, open) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener('click', e => {
            e.preventDefault();
            document.querySelectorAll('details.code-fold').forEach(el => {
                open ? el.setAttribute('open', '') : el.removeAttribute('open');
            });
        });
    };

    bindToggle('quarto-show-all-code', true);
    bindToggle('quarto-hide-all-code', false);
</script>

<script id="script-fix-sidebar-toggle">
    // Let sidebar section title empty area be clickable to toggle collapse/expand
    
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.sidebar-item-section > .sidebar-item-container').forEach(row => {
            row.style.cursor = 'pointer';
            row.addEventListener('click', e => {
                // title text -> let the link navigate normally
                if (e.target.closest('.sidebar-item-text')) return;
                // chevron -> Bootstrap handles it natively; don't double-toggle
                if (e.target.closest('.sidebar-item-toggle')) return;
                // empty area of the row -> trigger the toggle once
                row.querySelector('.sidebar-item-toggle')?.click();
            });
        });
    });
</script>


<!-- ====================================================================== -->
<script id="script-fix-sidebar-search">
    // Add-on sidebar search bar

    // Quarto autocomplete attaches to the FIRST #quarto-search (navbar, via getElementById).
    // The sidebar's duplicate #quarto-search is never initialized. Replace it with a button
    // that opens the real search overlay via window.quartoOpenSearch().

    document.addEventListener('DOMContentLoaded', () => {
        const sidebarSearchWrapper = document.querySelector('#quarto-sidebar .sidebar-search');
        if (!sidebarSearchWrapper) return;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'sidebar-search-trigger';
        btn.setAttribute('aria-label', 'Search');
        btn.innerHTML = '<i class="bi bi-search"></i><span>Search</span><kbd>F</kbd>';
        btn.addEventListener('click', () => window.quartoOpenSearch?.());

        sidebarSearchWrapper.replaceChildren(btn);
    });
</script>

<script id="script-fix-tag-redirect">
    // Redirect post-page tag to corresponding listing page

    document.addEventListener("DOMContentLoaded", function () {

        // 每种内容类型对应的 listing 页面（可按需增减）
        const SECTION_MAP = {
            projects:  "projects",
            tutorials: "tutorials",
            blogs:     "blogs",
            tools:     "tools",
        };

        function getTarget() {
            const path = window.location.pathname;

            // 提取语言前缀 /en/ 或 /zh/，没有则为 /
            const langMatch = path.match(/^\/(en|zh)\//);
            const langPrefix = langMatch ? "/" + langMatch[1] + "/" : "/";

            // 提取当前所在 section
            const sectionMatch = path.match(/\/(projects|tutorials|blogs|tools)\//);
            const section = sectionMatch ? sectionMatch[1] : null;

            if (!section) return null; // 不在任何已知 section 下，不重写

            return langPrefix + SECTION_MAP[section] + "/";
        }

        function rewriteTagLinks() {
            const target = getTarget();
            if (!target) return;

            document.querySelectorAll("a[href*='#category=']").forEach(function (link) {
                const category = link.href.split("#category=")[1];
                if (category) {
                    link.href = target + "#category=" + category;
                }
            });
        }

        rewriteTagLinks();
        new MutationObserver(rewriteTagLinks)
            .observe(document.body, { childList: true, subtree: true });
    });
</script>


<!-- ====================================================================== -->
<script id="script-copyright-year">
    // Update the copyright year in the footer
    
    document.addEventListener("DOMContentLoaded", function () {
        const el = document.getElementById("copyright-year");
        if (el) el.textContent = new Date().getFullYear();
    });
</script>
