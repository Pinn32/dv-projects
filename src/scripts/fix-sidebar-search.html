<script>
    // Quarto autocomplete attaches to the FIRST #quarto-search (navbar, via getElementById).
    // The sidebar's duplicate #quarto-search is never initialized. Replace it with a button
    // that opens the real search overlay via window.quartoOpenSearch().
    document.addEventListener('DOMContentLoaded', () => {
        const sidebarSearchWrapper = document.querySelector('#quarto-sidebar .sidebar-search');
        if (!sidebarSearchWrapper) return;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'sidebar-search-trigger';
        btn.setAttribute('aria-label', 'Search');
        btn.innerHTML = '<i class="bi bi-search"></i><span>Search</span><kbd>F</kbd>';
        btn.addEventListener('click', () => window.quartoOpenSearch?.());

        sidebarSearchWrapper.replaceChildren(btn);
    });
</script>
