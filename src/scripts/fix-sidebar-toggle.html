<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.sidebar-item-section > .sidebar-item-container').forEach(function (row) {
            row.style.cursor = 'pointer';
            row.addEventListener('click', function (e) {
                // title text -> let the link navigate normally
                if (e.target.closest('.sidebar-item-text')) return;
                // chevron -> Bootstrap handles it natively; don't double-toggle
                if (e.target.closest('.sidebar-item-toggle')) return;
                // empty area of the row -> trigger the toggle once
                const toggle = row.querySelector('.sidebar-item-toggle');
                if (toggle) toggle.click();
            });
        });
    });
</script>
